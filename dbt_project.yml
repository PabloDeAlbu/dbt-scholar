# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_scholar'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'dw'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  # Config indicated by + and applies to all files under models/example/
  dbt_scholar:
    +materialized: table
    01_ldg:
      coar:
        +schema: coar
        +tags: [coar]
      dspacedb:
        +schema: dspacedb
        +tags: [dspacedb]
      dspacedb5:
        +schema: dspacedb5
        +tags: [dspacedb5]
      dspace:
        +schema: dspace
        +tags: [dspace]
      dspace5:
        +schema: dspace5
        +tags: [dspace5]
      oai:
        +schema: oai
        +tags: [oai]
      openaire:
        +schema: openaire
        +tags: [openaire]
      openalex:
        +schema: openalex
        +tags: [openalex]
    02_dv:
      coar:
        +schema: coar
        +tags: [coar]
      dspacedb:
        +schema: dspacedb
        +tags: [dspacedb]
      dspacedb5:
        +schema: dspacedb5
        +tags: [dspacedb5]
      dspace:
        +schema: dspace
        +tags: [dspace]
      dspace5:
        +schema: dspace5
        +tags: [dspace5]
      oai:
        +schema: oai
        +tags: [oai]
      openaire:
        +schema: openaire
        +tags: [openaire]
      openalex:
        +schema: openalex
        +tags: [openalex]
    03_dm:
      audit:
        +schema: audit
        +tags: [audit]
        oai:
          +tags: [oai]
        dspacedb:
          +tags: [dspacedb]
        dspacedb5:
          +tags: [dspacedb5]
        openaire:
          +tags: [openaire]
        openalex:
          +tags: [openalex]
      core:
        # Models in models/03_dm/core/ root build in dm_core.
        # Subdirectories can override +schema and build in dm_<subschema>.
        +schema: core
        coar:
          +schema: coar
          +tags: [coar]
        dspacedb:
          +schema: dspacedb
          +tags: [dspacedb]
        dspacedb5:
          +schema: dspacedb5
          +tags: [dspacedb5]
        dspace:
          +schema: dspace
          +tags: [dspace]
        dspace5:
          +schema: dspace5
          +tags: [dspace5]
        oai:
          +schema: oai
          +tags: [oai]
        openaire:
          +schema: openaire
          +tags: [openaire]
        openalex:
          +schema: openalex
          +tags: [openalex]
      custom:
        cic:
          +schema: cic
          +tags: [cic]
        conicet:
          +schema: conicet
          +tags: [conicet]
        smn:
          +schema: smn
          +tags: [smn]
        unlp:
          +schema: unlp
          +tags: [unlp]
    04_viz:
      core:
        audit:
          +schema: audit
        openaire:
          +schema: openaire
          +tags: [openaire]
        openalex:
          +schema: openalex
          +tags: [openalex]
      custom:
        cic:
          +schema: cic
          +tags: [cic]
        conicet:
          +schema: conicet
          +tags: [conicet]
        unlp:
          +schema: unlp
          +tags: [unlp]
seeds:
  dbt_scholar:
    coar:
      +schema: coar
      +tags: [coar]
    dspacedb:
      +schema: dspacedb
      +tags: [dspacedb]
    dspacedb5:
      +schema: dspacedb5
      +tags: [dspacedb5]
    openaire:
      +schema: openaire
      +tags: [openaire]
    openalex:
      +schema: openalex
      +tags: [openalex]
    oai:
      +schema: oai
      +tags: [oai]

data_tests:
  +store_failures: true
  +schema: dbt_test_failures

vars:
    "dbt_date:time_zone": "America/Argentina/Buenos_Aires"

    # Ejemplo cic:
    dspacedb_source_label: "cicdigital"
    dspacedb_institution_ror: "https://ror.org/02s7sax82"

    # Valores requeridos para dumps `dspacedb5`.
    # Ejemplo unlp:
    dspacedb5_base_url: "sedici.unlp.edu.ar"
    dspacedb5_institution_ror: "https://ror.org/01tjs6929"
    dspacedb5_extract_datetime: "2026-04-06"
    #dspacedb5_base_url: "REPLACE ME"
    #dspacedb5_institution_ror: "REPLACE ME"
    #dspacedb5_extract_datetime: "REPLACE ME"

    # Ejemplo oai con conicet:
    oai_repository_identifier: "ri.conicet.gov.ar"
    oai_institution_ror: "https://ror.org/03cqe8w59"
