version: 2

seeds:
  - name: seed_dspacedb5_repository
    description: >
      Mapeo versionado de repositorios DSpace 5 para la rama `dspacedb5`. Define el `source_label`,
      el ROR institucional y qué repositorio queda activo por defecto para construir el contexto del dump.
    columns:
      - name: repository_key
        data_tests: [not_null, unique]
      - name: institution_key
        data_tests: [not_null]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: is_active
        data_tests: [not_null]
