version: 2

sources:
  - name: dspacedb
    description: 'DSpace database parametrizada para cargas manuales tipo dspacedb'
    schema: ldg_dspacedb
    tables:
      - name: community
      - name: collection
      - name: collection2item
      - name: community2collection
      - name: community2community
      - name: cwf_collectionrole
      - name: cwf_workflowitemrole
      - name: dspaceobject
      - name: eperson
      - name: epersongroup
      - name: epersongroup2eperson
      - name: group2groupcache
      - name: item
      - name: metadatafieldregistry
      - name: metadataschemaregistry
      - name: metadatavalue
      - name: resourcepolicy

models:
  - name: ldg_dspacedb_context
    description: >
      Contexto activo del dump DSpace utilizado para inyectar `source_label`, `institution_ror`,
      `extract_datetime` y `load_datetime` sobre las tablas crudas de `ldg_dspacedb`. Los valores
      de `source_label` e `institution_ror` se parametrizan con `vars` en `dbt_project.yml`.
    columns:
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: ldg_dspacedb_item
    description: >
      Capa landing normalizada para items DSpace con contexto explícito de repositorio e
      institución inyectado desde `vars` del proyecto.
    columns:
      - name: item_id
        description: >
          Identificador legado numérico del item. Puede venir nulo en DSpace 7+ y
          solo estará presente cuando el registro conserve referencia a un item de
          una versión legacy del repositorio.
      - name: _source_label
        data_tests:
          - not_null
      - name: _institution_ror
        data_tests:
          - not_null
      - name: _extract_datetime
        data_tests:
          - not_null
      - name: _load_datetime
        data_tests:
          - not_null
