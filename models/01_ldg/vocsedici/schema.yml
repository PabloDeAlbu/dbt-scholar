models:
  - name: ldg_vocsedici_node
    description: >
      Normalización mínima de la tabla base `node` de Drupal para VOC Sedici.
      Expone una fila por nodo con claves técnicas, tipo de contenido y fechas
      principales en tipos consistentes.
    columns:
      - name: node_id
        description: Identificador numérico del nodo en Drupal.
        data_tests: [not_null, unique]
      - name: revision_id
        description: Identificador de la revisión actual del nodo.
        data_tests: [not_null]
      - name: node_type
        description: Tipo de contenido Drupal del nodo.
        data_tests: [not_null]
      - name: _load_datetime
        description: Fecha-hora de carga en landing.
        data_tests: [not_null]

  - name: ldg_vocsedici_node_field_data
    description: >
      Normalización mínima de `node_field_data` para conservar los atributos
      principales del nodo por idioma con casts homogéneos.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [node_id, langcode]
    columns:
      - name: node_id
        description: Identificador del nodo en Drupal.
        data_tests: [not_null]
      - name: revision_id
        description: Revisión del nodo representada en la fila.
        data_tests: [not_null]
      - name: node_type
        description: Tipo de contenido Drupal del nodo.
        data_tests: [not_null]
      - name: langcode
        description: Idioma de la fila del nodo.
        data_tests: [not_null]
      - name: _load_datetime
        description: Fecha-hora de carga en landing.
        data_tests: [not_null]

  - name: ldg_vocsedici_node__field_nombre
    description: >
      Normalización mínima del campo Drupal `field_nombre`. Conserva el grano
      por nodo, idioma y posición del valor.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [node_id, langcode, delta]
    columns:
      - name: node_id
        description: Nodo dueño del valor del campo.
        data_tests: [not_null]
      - name: revision_id
        description: Revisión del nodo vinculada al valor.
        data_tests: [not_null]
      - name: langcode
        description: Idioma del valor del campo.
        data_tests: [not_null]
      - name: delta
        description: Posición del valor dentro del campo.
        data_tests: [not_null]
      - name: nombre
        description: Valor textual normalizado del nombre.
      - name: _load_datetime
        description: Fecha-hora de carga en landing.
        data_tests: [not_null]

  - name: ldg_vocsedici_node__field_apellido
    description: >
      Normalización mínima del campo Drupal `field_apellido`. Conserva el grano
      por nodo, idioma y posición del valor.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [node_id, langcode, delta]
    columns:
      - name: node_id
        description: Nodo dueño del valor del campo.
        data_tests: [not_null]
      - name: revision_id
        description: Revisión del nodo vinculada al valor.
        data_tests: [not_null]
      - name: langcode
        description: Idioma del valor del campo.
        data_tests: [not_null]
      - name: delta
        description: Posición del valor dentro del campo.
        data_tests: [not_null]
      - name: apellido
        description: Valor textual normalizado del apellido.
      - name: _load_datetime
        description: Fecha-hora de carga en landing.
        data_tests: [not_null]

  - name: ldg_vocsedici_node__field_padre
    description: >
      Normalización mínima del campo Drupal `field_padre`. Conserva el grano
      por nodo, idioma y posición del valor para exponer la relación
      jerárquica entre instituciones.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [node_id, langcode, delta]
    columns:
      - name: node_id
        description: Nodo institución hijo dueño del valor del campo.
        data_tests: [not_null]
      - name: revision_id
        description: Revisión del nodo vinculada al valor.
        data_tests: [not_null]
      - name: langcode
        description: Idioma del valor del campo.
        data_tests: [not_null]
      - name: delta
        description: Posición del valor dentro del campo.
        data_tests: [not_null]
      - name: parent_institution_node_id
        description: Identificador del nodo institución padre referenciado por la fuente.
      - name: _load_datetime
        description: Fecha-hora de carga en landing.
        data_tests: [not_null]

  - name: ldg_vocsedici_paragraphs_item
    description: >
      Normalización mínima de la tabla base `paragraphs_item` de Drupal para
      VOC Sedici.
    columns:
      - name: paragraph_id
        data_tests: [not_null, unique]
      - name: revision_id
        data_tests: [not_null]
