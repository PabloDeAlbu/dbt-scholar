version: 2

sources:
  - name: vocsedici
    description: >
      Extracción cruda de VOC Sedici desde Drupal cargada a landing por Kedro.
      Esta capa conserva tablas operativas casi sin transformación para que los
      joins y normalizaciones de negocio se resuelvan después en dbt.
    schema: ldg_vocsedici
    tables:
      - name: node
        description: >
          Tabla base de entidades `node` de Drupal. Expone el identificador del
          nodo y su revisión vigente para anclar el resto de las tablas de
          campos.
        columns:
          - name: nid
            description: Identificador numérico estable del nodo en Drupal.
            data_tests: [not_null, unique]
          - name: vid
            description: Identificador de la revisión vigente referenciada por el nodo.
            data_tests: [not_null]
          - name: type
            description: Tipo de contenido Drupal asociado al nodo.
            data_tests: [not_null]

      - name: node_field_data
        description: >
          Atributos principales del nodo por idioma en la tabla operativa de
          Drupal. Suele contener el título, estado de publicación y otras
          banderas de la versión actual.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [nid, langcode]
        columns:
          - name: nid
            description: Identificador del nodo en Drupal.
            data_tests: [not_null]
          - name: vid
            description: Revisión del nodo a la que pertenecen estos datos principales.
            data_tests: [not_null]
          - name: type
            description: Tipo de contenido Drupal asociado al nodo.
            data_tests: [not_null]
          - name: langcode
            description: Código de idioma de la fila almacenada en Drupal.
            data_tests: [not_null]

      - name: paragraphs_item
        description: >
          Tabla base de entidades `paragraph` de Drupal para modelar bloques
          embebidos de afiliación y otros componentes asociados a nodos.
        columns:
          - name: id
            description: Identificador numérico estable del paragraph.
            data_tests: [not_null, unique]
          - name: revision_id
            description: Identificador de la revisión vigente del paragraph.
            data_tests: [not_null]
          - name: type
            description: Tipo de paragraph Drupal.
            data_tests: [not_null]

      - name: paragraphs_item_field_data
        description: >
          Atributos principales del paragraph por idioma. En VOC Sedici se usa
          para vincular el paragraph de afiliación con su nodo padre.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [id, langcode]
        columns:
          - name: id
            data_tests: [not_null]
          - name: revision_id
            data_tests: [not_null]
          - name: type
            data_tests: [not_null]
          - name: langcode
            data_tests: [not_null]

      - name: paragraph__field_persona_id
        description: Campo Drupal `field_persona_id` sobre paragraphs de afiliación.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [entity_id, langcode, delta]
        columns:
          - name: entity_id
            data_tests: [not_null]
          - name: revision_id
            data_tests: [not_null]
          - name: langcode
            data_tests: [not_null]
          - name: delta
            data_tests: [not_null]

      - name: paragraph__field_institucion
        description: Campo Drupal `field_institucion` con referencia al nodo institución.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns: [entity_id, langcode, delta]
