version: 2

sources:
  - name: dspacedb5
    description: 'DSpace 5 dump cargado manualmente para la rama dspacedb5'
    schema: ldg_dspacedb5
    tables:
      - name: bitstream
      - name: bundle2bitstream
      - name: collection
      - name: collection2item
      - name: community
      - name: community2collection
      - name: community2community
      - name: eperson
      - name: handle
      - name: item
      - name: item2bundle
      - name: metadatafieldregistry
      - name: metadataschemaregistry
      - name: metadatavalue

models:
  - name: ldg_dspacedb5_context
    description: >
      Contexto activo del dump DSpace 5 utilizado para inyectar `base_url`, `source_label`,
      `institution_ror`, `extract_datetime` y `load_datetime` sobre las tablas crudas de
      `ldg_dspacedb5`. `base_url` se parametriza con `vars` en `dbt_project.yml`, se normaliza a
      minúsculas y sin protocolo, y por compatibilidad también se expone como `source_label`.
    columns:
      - name: base_url
        data_tests: [not_null]
      - name: source_label
        description: Alias compatible derivado de `base_url`.
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: ldg_dspacedb5_item
    description: >
      Capa landing normalizada para items DSpace 5 con contexto explícito de repositorio e
      institución inyectado desde `vars` del proyecto. En `ldg` los metadatos técnicos de ingestión
      se conservan con prefijo `_` (`_source_label`, `_institution_ror`, `_extract_datetime`,
      `_load_datetime`) para distinguirlos de los atributos de negocio.
    columns:
      - name: item_id
        data_tests:
          - not_null
      - name: _source_label
        description: Etiqueta técnica de la fuente en la capa landing.
        data_tests:
          - not_null
      - name: _institution_ror
        description: ROR institucional técnico inyectado en la capa landing.
        data_tests:
          - not_null
      - name: _extract_datetime
        description: Fecha/hora técnica de extracción conservada con prefijo `_` en landing.
        data_tests:
          - not_null
      - name: _load_datetime
        description: Fecha/hora técnica de carga conservada con prefijo `_` en landing.
        data_tests:
          - not_null
