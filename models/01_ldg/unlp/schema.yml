version: 2

sources:
  - name: gs
    description: >
      Extracción tabular de Google Scholar a nivel de perfiles de autor
      observados para UNLP. La tabla conserva observaciones crudas por corrida y
      se usa como insumo inicial para seguimiento institucional de perfiles.
    schema: ldg_gs
    tables:
      - name: author
        description: >
          Perfiles de autor extraídos desde Google Scholar. El grano esperado es
          una observación de perfil por archivo/corrida.
        columns:
          - name: source_file
            data_tests: [not_null]
          - name: source_system
            data_tests: [not_null]
          - name: entity_type
            data_tests: [not_null]
          - name: name
            data_tests: [not_null]
          - name: profile_url
            data_tests: [not_null]
          - name: user
            quote: true
            data_tests: [not_null]
          - name: _load_datetime
            data_tests: [not_null]

models:
  - name: ldg_unlp_centros_conicet
    description: >
      Normalización mínima del seed curado de comunidades CONICET-UNLP con mapeo a
      comunidad/colección de SEDICI. Conserva una fila por `set_spec` y excluye filas
      manuales de totales, separadores y otros sets sin destino SEDICI explícito.
    config:
      tags: [unlp]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "sedici_article_count >= 0"
      - dbt_utils.expression_is_true:
          expression: "pdf_share_pct is null OR (pdf_share_pct >= 0 AND pdf_share_pct <= 100)"
    columns:
      - name: set_spec
        description: Identificador `setSpec` OAI-PMH de la comunidad CONICET relevada.
        data_tests:
          - not_null
          - unique
      - name: set_name
        description: Nombre descriptivo del set/comunidad según el relevamiento manual.
        data_tests:
          - not_null
      - name: sedici_collection_uri
        description: Handle/URI de la comunidad o colección de SEDICI asociada al centro.
        data_tests:
          - not_null
      - name: faculty
        description: Unidad académica UNLP asociada en el relevamiento manual.
      - name: pdf_share_pct
        description: Porcentaje de documentos con PDF, normalizado a valor numérico.
      - name: sedici_article_count
        description: Cantidad de artículos actualmente presentes en SEDICI para el centro.
      - name: manual_status
        description: Estado o anotación manual breve asociada al centro.
      - name: ingest_note
        description: Nota manual sobre potencial incorporación o situación de carga.

  - name: ldg_unlp_conicet_imported_item
    description: >
      Normalización mínima del relevamiento manual de ítems SEDICI ya importados
      desde tandas de incorporación de CONICET. Conserva una fila por par
      `batch_name + mapfile_item_key` y expone el `sedici_item_id` para
      exclusión o auditoría aguas abajo.
    config:
      tags: [unlp]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [batch_name, mapfile_item_key]
    columns:
      - name: batch_name
        description: Nombre de la tanda/mapfile de importación manual.
        data_tests:
          - not_null
      - name: mapfile_item_key
        description: Clave secuencial del mapfile (`item_001`, `item_002`, etc.).
        data_tests:
          - not_null
      - name: sedici_item_id
        description: Identificador numérico del ítem en SEDICI ya importado.
        data_tests:
          - not_null
          - unique

  - name: ldg_unlp_scholar_author
    description: >
      Normalización mínima de perfiles de Google Scholar observados para UNLP.
      Conserva el historial de observaciones por perfil y parsea señales
      operativas como dominio de email verificado, intereses y afiliación.
    config:
      tags: [unlp]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [scholar_user_id, load_datetime, source_file]
    columns:
      - name: scholar_user_id
        description: Identificador estable del perfil en Google Scholar.
        data_tests: [not_null]
      - name: profile_url
        description: URL canónica del perfil observado.
        data_tests: [not_null]
      - name: author_name
        description: Nombre visible del perfil al momento de la observación.
        data_tests: [not_null]
      - name: verified_email_domain
        description: Dominio extraído del texto de email verificado, cuando pudo inferirse.
      - name: has_unlp_verified_email
        description: Flag que indica si el dominio verificado termina en `unlp.edu.ar`.
        data_tests: [not_null]
      - name: mentions_unlp_affiliation
        description: Flag que indica si la afiliación contiene `UNLP` o `Universidad Nacional de La Plata`.
        data_tests: [not_null]
      - name: interest_count
        description: Cantidad de intereses parseados desde el arreglo JSON de Scholar.
        data_tests: [not_null]
      - name: load_datetime
        description: Fecha-hora de carga de la observación cruda.
        data_tests: [not_null]

  - name: ldg_unlp_ir_scholar_author_manual_map
    description: >
      Normalización mínima del seed curado de correspondencias manuales entre
      autores del IR UNLP y perfiles de Google Scholar. El seed admite anclar
      el autor IR por `authority` o por `ir_author_hk` y conserva un estado de
      revisión simple para trabajo colaborativo.
    config:
      tags: [unlp]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [authority, ir_author_hk, scholar_user_id]
    columns:
      - name: authority
        description: Clave de authority del autor IR cuando existe control de autoridades.
      - name: ir_author_hk
        description: Clave hash del autor IR usada cuando no se trabaja con authority o como control adicional.
      - name: scholar_user_id
        description: Identificador del perfil en Google Scholar.
        data_tests: [not_null]
      - name: review_status
        description: Estado manual del match (`pending`, `approved`, `rejected`, etc.).
        data_tests: [not_null]
