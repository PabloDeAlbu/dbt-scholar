version: 2

sources:
  - name: dspace
    description: 'DSpace 7 database'
    schema: ldg_dspace
    tables:
      - name: collection
        columns:
          - name: collection_id
            data_tests:
            - unique
          - name: uuid
            data_tests:
            - unique
            - not_null
      - name: collection2item
        columns:
          - name: collection_id
            data_tests:
            - not_null
          - name: item_id
            data_tests:
            - not_null
      - name: community
        columns:
          - name: collection_id
          - name: uuid
            data_tests:
              - not_null
          - name: submitter
          - name: template_item_id
          - name: logo_bitstream_id
          - name: admin
      - name: community2collection
        columns:
          - name: collection_id 
            data_tests:
            - not_null
          - name: community_id
            data_tests:
            - not_null
      - name: community2community
        columns:
          - name: parent_comm_id 
            data_tests:
            - not_null
          - name: child_comm_id
            data_tests:
            - not_null
      - name: dspaceobject
        columns:
          - name: uuid
            data_tests:
            - unique
            - not_null
      - name: item
        columns:
          - name: item_id
          - name: in_archive
            data_tests:
              - not_null
          - name: withdrawn
            data_tests:
              - not_null
          - name: last_modified
            data_tests:
              - not_null
          - name: discoverable
            data_tests:
              - not_null
          - name: uuid
            data_tests:
              - not_null
          - name: submitter_id
#            data_tests:
#              - not_null
          - name: owning_collection
#            data_tests:
#              - not_null
      - name: metadatafieldregistry
        columns:
          - name: metadata_field_id
            data_tests:
              - unique
              - not_null
          - name: metadata_schema_id
            data_tests:
              - not_null
          - name: element
            data_tests:
              - not_null
          - name: qualifier
          - name: scope_note
      - name: metadataschemaregistry
        columns:
          - name: metadata_schema_id
            data_tests:
              - unique
              - not_null
          - name: namespace
            data_tests:
              - unique
              - not_null
          - name: short_id
            data_tests:
              - unique
              - not_null
      - name: metadatavalue
        columns:
          - name: metadata_value_id
            data_tests:
            - not_null
          - name: metadata_field_id
            data_tests:
            - not_null
            - relationships:
                to: ref('ldg_dspace_metadatafieldregistry')
                field: metadata_field_id
          - name: text_value
            data_tests:
            - not_null
          - name: text_lang
          - name: place
          - name: authority
          - name: confidence
          - name: dspace_object_id
            data_tests:
            - not_null
