version: 2

models:
  - name: latest_sat_dspacedb_item
    description: Estado más reciente de `sat_dspacedb_item`, a grano `item_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_hk
        data_tests: [not_null, unique]
      - name: item_id
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb_item__extract
    description: >
      Último contexto de extracción por `item_hk + source_label + institution_ror`
      a partir de `sat_dspacedb_item__extract`.
    config:
      tags: [dspacedb, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [item_hk, source_label, institution_ror]
    columns:
      - name: item_hk
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb_item_metadatavalue
    description: >
      Estado más reciente de `sat_dspacedb_item_metadatavalue`, a grano `item_metadatavalue_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_metadatavalue_hk
        data_tests: [not_null, unique]
      - name: metadata_value_id
        data_tests: [not_null]

  - name: latest_sat_dspacedb_metadatavalue
    description: Estado más reciente de `sat_dspacedb_metadatavalue`, a grano `metadatavalue_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: metadatavalue_hk
        data_tests: [not_null, unique]
      - name: metadata_value_id
        data_tests: [not_null]

  - name: latest_sat_dspacedb_collection
    description: Estado más reciente de `sat_dspacedb_collection`, a grano `collection_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: collection_hk
        data_tests: [not_null, unique]
      - name: collection_uuid
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb_collection__extract
    description: >
      Último contexto de extracción por `collection_hk + source_label + institution_ror`
      a partir de `sat_dspacedb_collection__extract`.
    config:
      tags: [dspacedb, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [collection_hk, source_label, institution_ror]
    columns:
      - name: collection_hk
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: dim_dspacedb_metadatafield
    description: >
      Dimensión de campos de metadatos contextualizados por repositorio e institución para la rama
      `dspacedb`.
    config:
      tags: [dspacedb, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [metadatafield_fullname, source_label, institution_ror]
    columns:
      - name: metadatafield_fullname
        data_tests: [not_null]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: metadatafield_hk
        data_tests: [not_null, unique]

  - name: dim_dspacedb_collection
    description: >
      Dimensión de collections contextualizadas por repositorio e institución para la rama
      `dspacedb`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: collection_hk
        data_tests: [not_null, unique]
      - name: collection_uuid
        data_tests: [not_null]
      - name: collection_title
        description: Título o nombre visible de la colección en DSpace.
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]

  - name: fct_dspacedb_item_extraction
    description: >
      Hecho base de eventos de extracción para items de la rama `dspacedb`.
      Conserva el contexto técnico de observación por repositorio e institución.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: extract_cdk
        data_tests: [not_null, unique]
      - name: item_hk
        data_tests: [not_null]
      - name: item_uuid
        data_tests: [not_null]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: fct_dspacedb_item_publication
    description: >
      Hecho base de items publicados para la rama `dspacedb`, a grano item. Expone el último
      estado conocido del item junto con su ventana temporal de observación en las extracciones.
      En DSpace 7+ el identificador canónico de la entidad es `item_uuid`; `item_id` se conserva
      solo como identificador legado cuando está presente.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_id
        description: Identificador legado del item, conservado si existe por compatibilidad.
        data_tests: [not_null]
      - name: item_uuid
        description: UUID canónico del item en DSpace 7+.
        data_tests: [not_null, unique]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]

  - name: fct_dspacedb_item_metadata
    description: >
      Hecho core de metadatos observados por item para la rama `dspacedb`. Expone el último valor
      conocido por `item_metadatavalue_hk` sobre el histórico persistido en DV.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_uuid
        data_tests: [not_null]
      - name: metadata_value_id
        data_tests: [not_null]
      - name: metadatafield_fullname
        data_tests: [not_null]

  - name: fct_dspacedb_eperson
    description: >
      Hecho simplificado de usuarios `eperson` para la rama `dspacedb`. Resume identidad, señales
      de administración, carga y lectura sobre un repositorio DSpace sin historización completa en
      DV. Se construye directo sobre `source`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: eperson_id
        description: Identificador legado del usuario en la base transaccional DSpace.
      - name: eperson_uuid
        description: UUID canónico del usuario en DSpace.
        data_tests: [not_null]
      - name: can_log_in
        description: Flag que indica si la cuenta tiene habilitado el login.
      - name: last_active
        description: Última actividad registrada en DSpace para el usuario.
      - name: group_count
        description: Cantidad de grupos efectivos a los que pertenece el usuario.
      - name: is_administrator
        description: >
          Flag derivado que resume si el usuario pertenece al grupo `Administrator` o a grupos
          administradores de comunidad o colección.
      - name: submitted_item_count
        description: Cantidad de ítems en los que el usuario aparece como `submitter_id`.

  - name: fct_dspacedb_metadatafield_usage
    description: >
      Hecho agregado de uso de campos de metadatos sobre los ítems observados en `dspacedb`.
      Resume cuántas ocurrencias de metadatos tiene cada campo y en cuántos ítems distintos aparece
      dentro de cada scope `source_label + institution_ror`.
    config:
      tags: [dspacedb, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [metadatafield_hk, source_label, institution_ror]
    columns:
      - name: metadatafield_hk
        description: Hash key del campo de metadato.
        data_tests: [not_null]
      - name: metadatafield_fullname
        description: Nombre completo del campo en formato `schema.element.qualifier`.
        data_tests: [not_null]
      - name: metadatafield_name
        description: Nombre derivado del campo concatenando `short_id`, `element` y `qualifier` cuando existe.
        data_tests: [not_null]
      - name: short_id
        description: Identificador corto del esquema de metadatos.
        data_tests: [not_null]
      - name: metadata_field_id
        description: Identificador técnico legado del campo de metadato.
        data_tests: [not_null]
      - name: element
        description: Elemento del campo de metadatos.
        data_tests: [not_null]
      - name: qualifier
        description: Qualifier del campo de metadatos, si existe.
      - name: metadata_value_count
        description: Cantidad total de ocurrencias de metadatos observadas para el campo.
        data_tests: [not_null]
      - name: metadata_value_id_count
        description: Cantidad de `metadata_value_id` distintos observados para el campo.
        data_tests: [not_null]
      - name: item_count
        description: Cantidad de ítems distintos en los que aparece el campo.
        data_tests: [not_null]
      - name: item_id_count
        description: Cantidad de `item_id` distintos en los que aparece el campo.
        data_tests: [not_null]
      - name: item_uuid_count
        description: Cantidad de `item_uuid` distintos en los que aparece el campo.
        data_tests: [not_null]
      - name: source_label
        description: Etiqueta de fuente del repositorio cargado.
        data_tests: [not_null]
      - name: institution_ror
        description: ROR institucional del repositorio cargado.
        data_tests: [not_null]
