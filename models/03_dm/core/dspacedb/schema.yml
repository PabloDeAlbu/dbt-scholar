version: 2

models:
  - name: latest_stg_dspacedb_item
    description: >
      Última fila de `stg_dspacedb_item` por `item_hk`. Se usa para resolver el
      identificador legado y otros atributos de staging sin repetir lógica latest.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_hk
        data_tests: [not_null, unique]
      - name: item_uuid
        data_tests: [not_null]

  - name: latest_sat_dspacedb_item
    description: Estado más reciente de `sat_dspacedb_item`, a grano `item_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_hk
        data_tests: [not_null, unique]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb_item__extract
    description: >
      Último contexto de extracción por `item_hk + source_label + institution_ror`
      a partir de `sat_dspacedb_item__extract`.
    config:
      tags: [dspacedb, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [item_hk, source_label, institution_ror]
    columns:
      - name: item_hk
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb_item_metadatavalue
    description: >
      Estado más reciente de `sat_dspacedb_item_metadatavalue`, a grano `item_metadatavalue_hk`.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_metadatavalue_hk
        data_tests: [not_null, unique]
      - name: metadata_value_id
        data_tests: [not_null]

  - name: fct_dspacedb_item_publication
    description: >
      Hecho base de items publicados para la rama `dspacedb`, a grano item. Expone el último
      estado conocido del item junto con su ventana temporal de observación en las extracciones.
      En DSpace 7+ el identificador canónico de la entidad es `item_uuid`; `item_id` se conserva
      solo como identificador legado cuando está presente.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_id
        description: Identificador legado del item, conservado si existe por compatibilidad.
        data_tests: [not_null]
      - name: item_uuid
        description: UUID canónico del item en DSpace 7+.
        data_tests: [not_null, unique]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]

  - name: fct_dspacedb_item_metadata
    description: >
      Hecho core de metadatos observados por item para la rama `dspacedb`. Expone el último valor
      conocido por `item_metadatavalue_hk` sobre el histórico persistido en DV.
    config:
      tags: [dspacedb, dm]
    columns:
      - name: item_uuid
        data_tests: [not_null]
      - name: metadata_value_id
        data_tests: [not_null]
      - name: metadatafield_fullname
        data_tests: [not_null]
