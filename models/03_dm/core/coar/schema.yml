version: 2

models:
  - name: dim_coar_resource_type
    description: >
      Dimensión de referencia de COAR Resource Types 2.0 derivada del Data Vault
      de COAR. Expone la URI canónica, etiquetas y jerarquías del vocabulario
      para estandarizar tipologías documentales entre fuentes.
    config:
      tags: [dm]
    columns:
      - name: coar_uri
        description: URI canónica del tipo de recurso COAR.
        data_tests:
          - not_null
          - unique
      - name: label_es
        description: Etiqueta en español del tipo de recurso (si está disponible).
      - name: label
        description: Etiqueta en inglés del tipo de recurso (si está disponible).
