version: 2

models:
  - name: latest_sat_openalex_work
    description: >
      Estado más reciente de `sat_openalex_work`, a grano `work_hk`. Centraliza la
      resolución latest para reutilización en dimensiones y facts de works.
    config:
      tags: [dm]
    columns:
      - name: work_hk
        data_tests: [not_null, unique]
      - name: load_datetime
        data_tests: [not_null]

  - name: fct_openalex_work_extraction
    description: >
      Hecho base de eventos de extracción de OpenAlex a nivel work. Conserva el
      filtro aplicado y los timestamps técnicos del evento para reutilización en
      capas analíticas y operativas. Cuando el filtro corresponde a
      `institutions.ror`, expone además el label institucional asociado.
    config:
      tags: [dm]
    columns:
      - name: extract_cdk
        data_tests: [not_null, unique]
      - name: work_hk
        data_tests: [not_null]
      - name: work_id
        data_tests: [not_null]
      - name: _filter_param
        description: Parámetro de filtro utilizado en la extracción.
      - name: _filter_value
        description: Valor del filtro utilizado en la extracción.
      - name: _filter_value_label
        description: >
          Label descriptivo del valor de filtro cuando `_filter_param =
          institutions.ror`, tomado de `dim_openalex_institution`.
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: dim_openalex_author
    description: Dimensión de autores OpenAlex con atributos básicos e identificadores (ORCID si existe).
    config:
      tags: [dm]
    columns:
      - name: author_id
        description: Identificador canónico de OpenAlex para el autor.
        data_tests:
          - not_null
          - unique
      - name: author_hk
        description: Clave hash del autor (PK del hub).
        data_tests:
          - not_null
          - unique
      - name: display_name
        description: Nombre de despliegue del autor.
      - name: works_count
        description: Cantidad de obras asociadas al autor (según OpenAlex).
      - name: cited_by_count
        description: Total de citas recibidas por el autor (según OpenAlex).
      - name: orcid
        description: ORCID del autor (si está disponible).
      - name: has_orcid
        description: Flag que indica presencia de ORCID.

  - name: dim_openalex_institution
    description: Dimensión de instituciones OpenAlex con país e identificador ROR (si está disponible).
    config:
      tags: [dm]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "ror = '-' OR trim(ror) ~ '^https?://ror[.]org/[0-9a-z]{9}/?$'"
    columns:
      - name: institution_hk
        description: Clave hash de la institución (PK del hub).
        data_tests: [not_null, unique]
      - name: institution_id
        description: Identificador canónico de OpenAlex para la institución.
        data_tests: [not_null, unique]
      - name: ror
        description: Identificador ROR (URL) o '-' si no está disponible.

  - name: dim_openalex_topic
    description: Dimensión de tópicos OpenAlex (display_name + jerarquías domain/field/subfield).
    config:
      tags: [dm]
    columns:
      - name: topic_hk
        description: Clave hash del tópico (PK del hub).
        data_tests: [not_null, unique]
      - name: topic_id
        description: Identificador canónico de OpenAlex para el tópico.
        data_tests: [not_null, unique]
      - name: display_name
        description: Etiqueta del tópico.

  - name: dim_openalex_work_pid
    description: >
      Perfil de PIDs por work OpenAlex, con identificadores normalizados y flags
      de presencia para cada esquema soportado.
    config:
      tags: [dm]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "doi = '-' OR doi ~* '^10\\\\.[0-9]{4,9}/\\\\S+$'"
    columns:
      - name: work_hk
        description: Clave hash de la obra (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('hub_openalex_work')
              field: work_hk
      - name: doi
        description: DOI sin prefijo https://doi.org/ o '-' si no hay.
      - name: has_doi
        description: Flag que indica presencia de DOI.
        data_tests: [not_null]
      - name: mag
        description: Identificador MAG o '-' si no hay.
      - name: has_mag
        description: Flag que indica presencia de MAG.
        data_tests: [not_null]
      - name: pmcid
        description: PMCID o '-' si no hay.
      - name: has_pmcid
        description: Flag que indica presencia de PMCID.
        data_tests: [not_null]
      - name: pmid
        description: PMID o '-' si no hay.
      - name: has_pmid
        description: Flag que indica presencia de PMID.
        data_tests: [not_null]

  - name: fct_openalex_work_publication
    description: >
      Hecho canónico de works OpenAlex a grano `work_hk`, con metadatos
      bibliográficos del work, señales OA, campos biblio y métricas agregadas
      (citas, FWCI, percentiles y costos APC cuando aplica).
    config:
      tags: [dm]
    columns:
      - name: work_id
        description: Identificador canónico de OpenAlex para la obra.
        data_tests:
          - not_null
          - unique
      - name: work_hk
        description: Clave hash de la obra (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('hub_openalex_work')
              field: work_hk
      - name: source_display_name
        description: Source principal tomado de `primary_location.source.display_name`.
      - name: issn
        description: ISSN-L del source principal tomado de `primary_location.source.issn_l`.
      - name: pages
        description: Páginas del work derivadas de `biblio.first_page` y `biblio.last_page`.
      - name: language
        description: Idioma informado por OpenAlex para el work.
      - name: license
        description: Licencia tomada de `primary_location.license`.
      - name: topics
        description: Topics OpenAlex agregados para el work y concatenados con `|`.
      - name: authors
        description: Autores OpenAlex agregados para el work y concatenados con `|`.
      - name: doi
        description: DOI normalizado del work o `null` si no está disponible.
      - name: has_doi
        description: Flag que indica presencia de DOI.
      - name: mag
        description: Identificador MAG del work o `null` si no está disponible.
      - name: has_mag
        description: Flag que indica presencia de MAG.
      - name: pmcid
        description: PMCID del work o `null` si no está disponible.
      - name: has_pmcid
        description: Flag que indica presencia de PMCID.
      - name: pmid
        description: PMID del work o `null` si no está disponible.
      - name: has_pmid
        description: Flag que indica presencia de PMID.
      - name: cited_by_count
        description: Cantidad de citas según OpenAlex.
      - name: fwci
        description: Field-Weighted Citation Impact (si está disponible).
      - name: citation_normalized_percentile_value
        description: Valor de percentil de citas normalizado (si está disponible).

  - name: brg_openalex_work_author
    description: Bridge obra–autor (vínculos N a N entre works y authors).
    config:
      tags: [dm]
    columns:
      - name: work_author_hk
        description: Clave hash del vínculo work-author.
        data_tests: [not_null, unique]
      - name: work_hk
        data_tests: [not_null]
      - name: author_hk
        data_tests: [not_null]

  - name: brg_openalex_work_institution
    description: Bridge obra–institución (afiliaciones institucionales asociadas a works).
    config:
      tags: [dm]
    columns:
      - name: work_institution_hk
        description: Clave hash del vínculo work-institution.
        data_tests: [not_null, unique]
      - name: work_hk
        data_tests: [not_null]
      - name: institution_hk
        data_tests: [not_null]

  - name: brg_openalex_author_institution
    description: Bridge autor–institución (afiliaciones institucionales asociadas a authors).
    config:
      tags: [dm]
    columns:
      - name: author_institution_hk
        description: Clave hash del vínculo author-institution.
        data_tests: [not_null, unique]
      - name: author_hk
        data_tests: [not_null]
      - name: institution_hk
        data_tests: [not_null]

  - name: brg_openalex_work_topic
    description: Bridge obra–tópico (asignaciones temáticas por tópico).
    config:
      tags: [dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [work_hk, topic_hk]
    columns:
      - name: work_hk
        data_tests: [not_null]
      - name: topic_hk
        data_tests: [not_null]

  - name: brg_openalex_work_primarytopic
    description: Bridge obra–tópico primario con score (tópico principal asignado por OpenAlex).
    config:
      tags: [dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [work_hk, topic_hk]
    columns:
      - name: work_hk
        data_tests: [not_null]
      - name: topic_hk
        data_tests: [not_null]
      - name: primarytopic_score
        description: Score de asignación del tópico primario.

  - name: brg_openalex_work_primarylocation
    description: >
      Bridge obra–source principal (`primary_location`) con atributos propios de
      esa relación, incluyendo licencia e identificadores del source principal.
    config:
      tags: [dm]
    columns:
      - name: work_hk
        data_tests: [not_null, unique]
      - name: source_hk
        data_tests: [not_null]
      - name: source_display_name
        description: Nombre del source asociado a `primary_location`.
      - name: source_issn_l
        description: ISSN-L del source asociado a `primary_location`.
      - name: license
        description: Licencia informada en `primary_location`.
      - name: license_id
        description: Identificador de licencia informado en `primary_location`.
