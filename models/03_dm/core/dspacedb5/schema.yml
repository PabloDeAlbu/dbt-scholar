version: 2

models:
  - name: latest_sat_dspacedb5_item
    description: Estado más reciente de `sat_dspacedb5_item`, a grano `item_hk`.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: item_hk
        data_tests: [not_null, unique]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb5_item__extract
    description: >
      Último contexto de extracción por `item_hk + source_label + institution_ror`
      a partir de `sat_dspacedb5_item__extract`.
    config:
      tags: [dspacedb5, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [item_hk, source_label, institution_ror]
    columns:
      - name: item_hk
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: latest_sat_dspacedb5_item_metadatavalue
    description: >
      Estado más reciente de `sat_dspacedb5_item_metadatavalue`, a grano `item_metadatavalue_hk`.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: item_metadatavalue_hk
        data_tests: [not_null, unique]
      - name: metadata_value_id
        data_tests: [not_null]

  - name: fct_dspacedb5_item_extraction
    description: >
      Hecho base de eventos de extracción para items de la rama `dspacedb5`.
      Conserva el contexto técnico de observación por repositorio e institución.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: extract_cdk
        data_tests: [not_null, unique]
      - name: item_hk
        data_tests: [not_null]
      - name: item_id
        data_tests: [not_null]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]

  - name: fct_dspacedb5_item_publication
    description: >
      Hecho core de items publicados DSpace 5 a nivel de item contextualizado por repositorio e
      institución. Expone el último estado conocido del item junto con su ventana temporal de
      observación en las extracciones.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: item_hk
        data_tests: [not_null, unique]
      - name: item_id
        data_tests: [not_null]
      - name: source_label
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]

  - name: dim_dspacedb5_metadatafield
    description: Dimensión de campos de metadatos contextualizados por repositorio e institución para la rama `dspacedb5`.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: metadatafield_fullname
        data_tests: [not_null, unique]
      - name: metadatafield_hk
        data_tests: [not_null, unique]

  - name: fct_dspacedb5_item_metadata
    description: >
      Hecho core de metadatos observados por item para la rama `dspacedb5`. Expone el último valor
      conocido por `item_hk + metadata_value_id` sobre el histórico persistido en DV.
    config:
      tags: [dspacedb5, dm]
    columns:
      - name: item_hk
        data_tests: [not_null]
      - name: metadata_value_id
        data_tests: [not_null]
      - name: metadatafield_fullname
        data_tests: [not_null]
