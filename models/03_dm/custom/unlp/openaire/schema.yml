version: 2

models:
  - name: fct_unlp_openaire_researchproduct
    description: >
      Subconjunto institucional UNLP del hecho de publicaciones OpenAIRE, filtrado por ROR usado en la extracción
      para definir una cohorte de producción académica atribuible a la institución.
    config:
      tags: [unlp, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          name: unlp_openaire_organization_ror_format
          expression: "trim(organization_ror) ~ '^https?://ror[.]org/[0-9a-z]{9}/?$'"
          config:
            alias: unlp_openaire_organization_ror_format
    columns:
      - name: researchproduct_hk
        description: Clave hash del research product (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_openaire_researchproduct')
              field: researchproduct_hk
      - name: researchproduct_id
        description: Identificador canónico de OpenAIRE.
        data_tests:
          - not_null
          - unique
      - name: organization_ror
        description: Identificador ROR (URL) utilizado para filtrar la cohorte UNLP.
        data_tests: [not_null]
      - name: unlp_last_extract_datetime
        description: Última fecha/hora en la que el research product fue observado en la cohorte UNLP.
        data_tests: [not_null]
      - name: sdg_count
        description: Cantidad de SDGs asociados al research product según subjects OpenAIRE.
        data_tests: [not_null]
      - name: has_sdg
        description: Flag que indica si el research product tiene al menos un SDG asociado.
        data_tests: [not_null]
      - name: sdg_values
        description: Lista de SDGs asociados, concatenados con `|`.
