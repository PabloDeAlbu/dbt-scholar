version: 2

models:
  - name: fct_unlp_publication
    description: >
      Hecho institucional principal de publicaciones UNLP, basado en
      `fct_unlp_ir_item_publication` como universo del repositorio institucional
      y enriquecido por DOI exacto y único contra
      `fct_unlp_openalex_work_publication`. Este modelo representa publicaciones
      del IR y no un universo deduplicado general entre todas las fuentes.
    config:
      tags: [unlp, dm]
    columns:
      - name: publication_hk
        description: Identificador técnico de la publicación institucional, alineado al `item_hk` del IR.
        data_tests: [not_null, unique]
      - name: item_hk
        description: Clave hash del ítem del repositorio institucional.
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('fct_unlp_ir_item_publication')
              field: item_hk
      - name: item_id
        description: ID original del ítem en DSpace 5.
        data_tests: [not_null]
      - name: source_system
        description: Sistema fuente base del hecho institucional.
        data_tests: [not_null]
      - name: institutional_uri
        description: URI institucional de citación del ítem en el repositorio.
        data_tests: [not_null]
      - name: publication_date
        description: Fecha de publicación declarada en el IR.
      - name: publication_year
        description: Año derivado de `publication_date` cuando existe.
      - name: title
        description: Título principal de la publicación en el IR.
      - name: publication_type
        description: Tipología declarada para la publicación en el IR.
      - name: has_doi
        description: Flag que indica si el ítem tiene al menos un DOI normalizado.
        data_tests: [not_null]
      - name: doi
        description: DOI normalizados declarados en el IR, concatenados con `|`.
      - name: matched_by_unique_doi
        description: Indica si la publicación fue enriquecida por un match DOI exacto y único contra OpenAlex.
        data_tests: [not_null]
      - name: match_doi
        description: DOI normalizado usado para el enriquecimiento con OpenAlex, cuando existe.
      - name: openalex_work_hk
        description: Clave hash del work OpenAlex enlazado por DOI único, cuando existe.
      - name: openalex_work_id
        description: Identificador canónico del work OpenAlex enlazado, cuando existe.
