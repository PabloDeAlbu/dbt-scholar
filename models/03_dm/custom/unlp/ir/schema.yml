version: 2

models:
  - name: fct_unlp_ir_item_publication
    description: >
      Hecho institucional UNLP a nivel de ítem del repositorio, construido sobre
      `fct_dspacedb5_item_publication` con filtro institucional y enriquecido
      con metadatos descriptivos, PIDs normalizados y contexto técnico del ítem.
      Este modelo centraliza la representación analítica del IR para evitar
      recalcular cruces y agregados descriptivos en capas `viz`.
    config:
      tags: [unlp, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          name: unlp_ir_dc_identifier_uri_sedici_handle
          expression: "dc_identifier_uri ~ '^https?://sedici[.]unlp[.]edu[.]ar/handle/10915'"
          config:
            alias: unlp_ir_dc_identifier_uri_sedici_handle
            severity: warn
      - dbt_utils.expression_is_true:
          name: unlp_ir_date_accessioned_raw_tokens
          expression: "date_accessioned_raw is null OR date_accessioned_raw ~ '^(?:[0-9]{4}(?:[-/](0[1-9]|1[0-2])(?:[-/](0[1-9]|[12][0-9]|3[01])(?:[T ].*)?)?)?)(?:[|](?:[0-9]{4}(?:[-/](0[1-9]|1[0-2])(?:[-/](0[1-9]|[12][0-9]|3[01])(?:[T ].*)?)?)?))*$'"
          config:
            alias: unlp_ir_date_accessioned_raw_tokens
            severity: warn
      - dbt_utils.expression_is_true:
          name: unlp_ir_date_accessioned_parsed_when_raw
          expression: "date_accessioned_raw is null OR date_accessioned is not null"
          config:
            alias: unlp_ir_date_accessioned_parsed_when_raw
            severity: warn
      - dbt_utils.expression_is_true:
          name: unlp_ir_date_issued_raw_tokens
          expression: "date_issued_raw is null OR date_issued_raw ~ '^(?:[0-9]{4}(?:[-/](0[1-9]|1[0-2])(?:[-/](0[1-9]|[12][0-9]|3[01])(?:[T ].*)?)?)?)(?:[|](?:[0-9]{4}(?:[-/](0[1-9]|1[0-2])(?:[-/](0[1-9]|[12][0-9]|3[01])(?:[T ].*)?)?)?))*$'"
          config:
            alias: unlp_ir_date_issued_raw_tokens
            severity: warn
      - dbt_utils.expression_is_true:
          name: unlp_ir_date_issued_parsed_when_raw
          expression: "date_issued_raw is null OR date_issued is not null"
          config:
            alias: unlp_ir_date_issued_parsed_when_raw
            severity: warn
    columns:
      - name: item_hk
        description: Clave hash del ítem (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('fct_dspace5_item')
              field: item_hk
      - name: item_id
        description: ID original del ítem en DSpace 5.
        data_tests:
          - not_null
      - name: source_label
        description: Etiqueta técnica de la fuente de extracción del repositorio.
        data_tests:
          - not_null
      - name: institution_ror
        description: ROR institucional usado para definir el subconjunto del repositorio UNLP.
        data_tests:
          - not_null
      - name: dc_identifier_uri
        description: >
          Valor del metadato `dc.identifier.uri` (Handle/URI institucional) utilizado como identificador de citación.
        data_tests:
          - not_null
      - name: dc_identifier_uri_raw
        description: Valores crudos observados para `dc.identifier.uri` (concatenados) para auditoría de calidad.
      - name: date_accessioned
        description: Fecha de incorporación al repositorio (normalizada desde `dc.date.accessioned`).
      - name: date_accessioned_raw
        description: Valores crudos observados para `dc.date.accessioned` (concatenados) para auditoría.
      - name: dc_date_available
        description: Fecha `dc.date.available` normalizada.
      - name: dc_date_available_raw
        description: Valores crudos observados para `dc.date.available` (concatenados) para auditoría.
      - name: date_issued
        description: Fecha declarada de emisión/publicación (normalizada desde `dc.date.issued`).
      - name: date_issued_raw
        description: Valores crudos observados para `dc.date.issued` (concatenados) para auditoría.
      - name: dc_date_issued
        description: Alias técnico de compatibilidad para la fecha `dc.date.issued` normalizada.
      - name: dc_date_issued_raw
        description: Alias técnico de compatibilidad para los valores crudos de `dc.date.issued`.
      - name: title
        description: Título institucional del ítem, tomado de `dc.title`.
      - name: subtitle
        description: Títulos alternativos del ítem concatenados con `|`.
      - name: type
        description: Tipología declarada en `dc.type`.
      - name: description
        description: Descripciones o abstracts del ítem concatenados con `|`.
      - name: subject
        description: Subjects declarados para el ítem, concatenados con `|`.
      - name: subtype
        description: Subtipos Sedici del ítem, concatenados con `|`.
      - name: author
        description: Autores declarados en `sedici.creator.person`, concatenados con `|`.
      - name: author_count
        description: Cantidad de autores distintos no vacíos detectados para el ítem.
        data_tests:
          - not_null
      - name: issn
        description: ISSN declarados para el ítem, concatenados con `|`.
      - name: isbn
        description: ISBN declarados para el ítem, concatenados con `|`.
      - name: doi_count
        description: Cantidad de DOI normalizados detectados en los metadatos del ítem.
        data_tests:
          - not_null
      - name: handle_count
        description: Cantidad de handles normalizados detectados para el ítem.
        data_tests:
          - not_null
      - name: has_doi
        description: Flag que indica si el ítem tiene al menos un DOI normalizado.
        data_tests:
          - not_null
      - name: has_handle
        description: Flag que indica si el ítem tiene al menos un handle normalizado.
        data_tests:
          - not_null
      - name: doi
        description: Lista de DOI normalizados del ítem, concatenados con `|`.
      - name: handle
        description: Lista de handles normalizados del ítem, concatenados con `|`.
      - name: owningcollection_hk
        description: Hash key de la colección dueña del ítem dentro del scope institucional.
      - name: owning_collection_title
        description: Título preferido de la colección dueña.
      - name: owning_community_hk
        description: Hash key de la comunidad inmediata de la colección dueña.
      - name: owning_community_id
        description: Identificador original de la comunidad inmediata de la colección dueña.
      - name: owning_community_title
        description: Título preferido de la comunidad inmediata de la colección dueña.
      - name: owning_root_community_hk
        description: Hash key de la comunidad raíz de la rama de la colección dueña.
      - name: owning_root_community_id
        description: Identificador original de la comunidad raíz de la rama de la colección dueña.
      - name: owning_root_community_title
        description: Título preferido de la comunidad raíz de la rama de la colección dueña.
      - name: owning_community_path_ids
        description: Camino jerárquico de IDs desde la raíz hasta la comunidad dueña.
      - name: owning_community_path_titles
        description: Camino jerárquico de títulos desde la raíz hasta la comunidad dueña.
      - name: in_archive
        description: Flag operativo de DSpace 5 que indica si el ítem está archivado.
      - name: withdrawn
        description: Flag operativo de DSpace 5 que indica si el ítem fue retirado.
      - name: discoverable
        description: Flag operativo de DSpace 5 que indica si el ítem es descubrible.

  - name: fct_unlp_ir_item_community
    description: >
      Hecho institucional item-colección-comunidad del repositorio UNLP. Permite
      agrupar por comunidad raíz y filtrar por ramas específicas del árbol.
    config:
      tags: [unlp, dm]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [item_hk, collection_hk]

  - name: fct_unlp_ir_root_community_summary
    description: >
      Resumen analítico por comunidad raíz del repositorio UNLP, derivado de la
      relación item-comunidad y del hecho de publicaciones IR.
    config:
      tags: [unlp, dm]
    columns:
      - name: root_community_hk
      - name: root_community_id
      - name: root_community_title
      - name: item_count
      - name: item_count_owning_collection
      - name: collection_count
      - name: community_count

  - name: fct_unlp_ir_eperson
    description: >
      Hecho institucional de usuarios `eperson` del repositorio UNLP, enriquecido
      con actividad como submitter a partir de `fct_unlp_ir_item_publication`.
    config:
      tags: [unlp, dm]
    columns:
      - name: eperson_hk
        description: Hash key estable del usuario dentro del scope institucional del repositorio.
        data_tests:
          - not_null
          - unique
      - name: eperson_id
        description: ID original del usuario en la base transaccional DSpace 5.
        data_tests:
          - not_null
      - name: email
        description: Email registrado para la cuenta del usuario.
      - name: netid
        description: NetID o identificador de autenticación institucional informado por DSpace.
      - name: can_log_in
        description: Flag que indica si la cuenta tiene habilitado el login.
      - name: require_certificate
        description: Flag que indica si el usuario requiere certificado para autenticarse.
      - name: self_registered
        description: Flag que indica si la cuenta fue auto-registrada.
      - name: submitter_flag
        description: Flag que indica si el usuario aparece como submitter en al menos un item institucional.
      - name: first_item_submission_date
        description: Primera fecha aproximada de envío de ítems por el usuario.
      - name: last_item_submission_date
        description: Última fecha aproximada de envío de ítems por el usuario.
      - name: source_label
        description: Etiqueta de fuente del repositorio cargado.
        data_tests:
          - not_null
      - name: institution_ror
        description: ROR institucional del repositorio.
        data_tests:
          - not_null
      - name: first_extract_datetime
        description: Primera observación temporal del usuario en el warehouse para este scope institucional.
      - name: last_extract_datetime
        description: Última observación temporal del usuario en el warehouse para este scope institucional.
      - name: first_load_datetime
        description: Primera carga en la que el usuario quedó observado dentro del scope UNLP.
      - name: last_load_datetime
        description: Última carga en la que el usuario quedó observado dentro del scope UNLP.

  - name: dim_unlp_ir_item_type
    description: Dimensión auxiliar de tipologías declaradas en `dc.type` (repositorio UNLP).
    config:
      tags: [unlp, dm]
    columns:
      - name: text_value
        description: Valor textual de `dc.type`.
        data_tests:
          - not_null
