version: 2

models:
  - name: fct_cic_openaire_researchproduct_publication
    description: >
      Subconjunto institucional CIC del hecho de publicaciones OpenAIRE, filtrado por organización (ROR)
      utilizada en la extracción para construir un subconjunto reproducible.
    config:
      tags: [cic, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          name: cic_openaire_organization_ror_format
          expression: "trim(organization_ror) ~ '^https?://ror[.]org/[0-9a-z]{9}/?$'"
          config:
            alias: cic_openaire_organization_ror_format
    columns:
      - name: researchproduct_hk
        description: Clave hash del research product (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_openaire_researchproduct')
              field: researchproduct_hk
      - name: researchproduct_id
        description: Identificador canónico de OpenAIRE.
        data_tests:
          - not_null
          - unique
      - name: organization_ror
        description: Identificador ROR (URL) utilizado para filtrar el subconjunto institucional CIC.
        data_tests: [not_null]
      - name: unlp_last_extract_datetime
        description: Última fecha/hora en la que el research product fue observado en el subconjunto institucional (timestamp del extractor).
        data_tests: [not_null]
