version: 2

models:
  - name: fct_cic_dspacedb_item_publication
    description: >
      Hecho de items publicados en CIC DIGITAL, construido sobre `fct_dspacedb_item_publication`
    config:
      tags: [cic, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "coalesce(owning_collection_title, '') not in ('', '!UNKNOWN', 'N/A', 'NA')"
          config:
            severity: warn
    columns:
      - name: item_uuid
        data_tests: [not_null, unique]
      - name: item_id
        description: Identificador legado del item, disponible sólo cuando el dump lo conserva.
      - name: item_url
        description: URL canónica del item en la UI de CIC DIGITAL construida como `base_url/items/{item_uuid}/`.
      - name: owning_collection_url
        description: URL canónica de la colección owning construida como `base_url/collections/{owning_collection_uuid}/`.
      - name: institution_ror
        data_tests: [not_null]
      - name: owning_collection_title
        description: Título de la colección owning del item en DSpace.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: owning_community_title
        description: Título de la comunidad asociada a la colección owning del item.
      - name: owning_community_url
        description: URL canónica de la comunidad owning construida como `base_url/communities/{community_uuid}/`.
      - name: dc_date_available
        description: Valores crudos observados para `dc.date.available`, concatenados para auditoría.
        data_tests: [not_null]
      - name: dcterms_issued
        description: Valores crudos observados para `dcterms.issued`, concatenados para auditoría.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: dc_title
        description: Valores crudos observados para `dc.title`, concatenados para auditoría.
      - name: cic_parent_type
        description: Valores crudos observados para `cic.parentType`, concatenados para auditoría.
      - name: dc_type
        description: Valores crudos observados para `dc.type`, concatenados para auditoría.
        data_tests: [not_null]

  - name: fct_cic_dspacedb_eperson
    description: >
      Hecho institucional de usuarios `eperson` del repositorio CIC DIGITAL, construido sobre la
      tabla fuente `eperson` contextualizada por repositorio y enriquecido con actividad como
      submitter a partir de `fct_cic_dspacedb_item_publication`.
    config:
      tags: [cic, dm]
    columns:
      - name: eperson_hk
        description: Hash key estable del usuario dentro del scope institucional del repositorio.
        data_tests:
          - not_null
          - unique
      - name: eperson_id
        description: >
          ID canónico del usuario en la base transaccional DSpace; usa `eperson_id` cuando está
          presente y cae a `uuid` cuando el origen lo deja nulo.
        data_tests:
          - not_null
      - name: email
        description: Email registrado para la cuenta del usuario.
      - name: netid
        description: NetID o identificador de autenticación institucional informado por DSpace.
      - name: can_log_in
        description: Flag que indica si la cuenta tiene habilitado el login.
      - name: require_certificate
        description: Flag que indica si el usuario requiere certificado para autenticarse.
      - name: self_registered
        description: Flag que indica si la cuenta fue auto-registrada.
      - name: submitter_flag
        description: Flag que indica si el usuario aparece como submitter en al menos un item institucional.
      - name: first_item_submission_date
        description: Primera fecha aproximada de envío de ítems por el usuario.
      - name: last_item_submission_date
        description: Última fecha aproximada de envío de ítems por el usuario.
      - name: source_label
        description: Etiqueta de fuente del repositorio cargado.
        data_tests:
          - not_null
      - name: institution_ror
        description: ROR institucional del repositorio.
        data_tests:
          - not_null
      - name: first_extract_datetime
        description: Primera observación temporal del usuario en el warehouse para este scope institucional.
      - name: last_extract_datetime
        description: Última observación temporal del usuario en el warehouse para este scope institucional.
      - name: first_load_datetime
        description: Primera carga en la que el usuario quedó observado dentro del scope CIC.
      - name: last_load_datetime
        description: Última carga en la que el usuario quedó observado dentro del scope CIC.
