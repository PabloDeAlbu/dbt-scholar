version: 2

models:
  - name: fct_conicet_oai_record_publication
    description: >
      Hecho institucional CONICET a nivel de record OAI. Conserva el grano 1 fila
      por `record_hk` de `fct_oai_record_publication`, filtra el subset institucional
      configurado por variables y agrega enrichment 1:1 de identifier, DOI y subject.
    config:
      tags: [conicet, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "dc_identifier_uri ~ '^http://hdl\\\\.handle\\\\.net/11336/'"
      - dbt_utils.expression_is_true:
          expression: "dc_relation_doi is null OR dc_relation_doi ~* '^10\\\\.[0-9]{4,9}/\\\\S+$'"
    columns:
      - name: record_hk
        description: Clave hash del registro OAI.
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('fct_oai_record_publication')
              field: record_hk
      - name: record_id
        description: Identificador OAI-PMH del record.
        data_tests: [not_null, unique]
      - name: dc_type
        description: Lista raw de valores `dc.type` agregados en OAI y concatenados con `|`.
      - name: dc_type_count
        description: Cantidad de valores distintos de `dc.type` detectados para el record.
        data_tests: [not_null]
      - name: has_multiple_dc_type
        description: Flag que indica multiplicidad de `dc.type` en el record.
        data_tests: [not_null]
      - name: repository_identifier
        description: Identificador del repositorio OAI del que proviene el registro.
      - name: institution_ror
        description: ROR institucional asignado al contexto de extraccion.
      - name: valid_date_issued
        description: >
          Flag heredado de `fct_oai_record_publication` que indica si `date_issued`
          cae dentro del rango válido definido por la estructura OAI.
        data_tests: [not_null]
      - name: dc_identifier_uri
        description: Handle institucional filtrado por prefijo CONICET.
        data_tests:
          - not_null
          - unique
      - name: dc_relation_doi
        description: DOI principal obtenido desde `dc.relation`.
        data_tests:
          - unique:
              config:
                severity: warn

  - name: fct_conicet_oai_record_pid_profile
    description: >
      Perfilado de PIDs a nivel `record_hk` para el subset OAI de CONICET.
      Clasifica patrones observados en `dc_identifier_uri` y `dc_relation_doi`
      y expone flags de validez orientados a entender cobertura y calidad de
      identificadores en la fuente institucional.
    config:
      tags: [conicet, dm]
    columns:
      - name: record_hk
        description: Clave hash del record perfilado.
        data_tests: [not_null, unique]
      - name: record_id
        description: Identificador OAI-PMH del record.
        data_tests: [not_null]
      - name: dc_identifier_uri_pattern
        description: Patrón clasificado para `dc_identifier_uri`.
        data_tests: [not_null]
      - name: dc_identifier_uri_is_valid
        description: Flag de validez del identifier URI según el contrato institucional esperado.
        data_tests: [not_null]
      - name: dc_relation_doi_pattern
        description: Patrón clasificado para `dc_relation_doi`.
        data_tests: [not_null]
      - name: dc_relation_doi_is_valid
        description: Flag de validez del DOI OAI según el contrato esperado.
        data_tests: [not_null]
      - name: dc_type_count
        description: Cantidad de valores distintos de `dc.type` detectados para el record.
        data_tests: [not_null]
      - name: has_multiple_dc_type
        description: Flag de multiplicidad de `dc.type`.
        data_tests: [not_null]
      - name: has_doi
        description: Flag que indica presencia de DOI en OAI.
        data_tests: [not_null]
      - name: has_multiple_doi
        description: Flag que indica multiplicidad de DOI detectada en el record.
        data_tests: [not_null]

  - name: fct_conicet_oai_record_pid_coverage
    description: >
      Resumen agregado de cobertura y validez de PIDs en la fuente OAI de CONICET.
      Agrupa por dimensión observada (`dc_identifier_uri`, `dc_relation_doi`) y
      por patrón detectado para facilitar lectura analítica del perfilado base.
    config:
      tags: [conicet, dm]
    columns:
      - name: pid_dimension
        description: Dimensión perfilada (`dc_identifier_uri` o `dc_relation_doi`).
        data_tests: [not_null]
      - name: pid_pattern
        description: Patrón detectado dentro de la dimensión perfilada.
        data_tests: [not_null]
      - name: record_count
        description: Cantidad total de records observados para el patrón.
        data_tests: [not_null]
      - name: valid_record_count
        description: Cantidad de records válidos para el patrón.
        data_tests: [not_null]
      - name: invalid_record_count
        description: Cantidad de records inválidos para el patrón.
        data_tests: [not_null]
