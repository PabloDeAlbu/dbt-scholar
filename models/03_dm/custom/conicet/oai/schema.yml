version: 2

models:
  - name: fct_conicet_oai_record_publication
    description: >
      Hecho institucional CONICET a nivel de record OAI. Conserva el grano 1 fila
      por `record_hk` de `fct_oai_record_publication`, filtra el subset institucional
      configurado por variables y agrega enrichment 1:1 de identifier, DOI y subject.
    config:
      tags: [conicet, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "dc_identifier_uri ~ '^http://hdl\\\\.handle\\\\.net/11336/'"
      - dbt_utils.expression_is_true:
          expression: "dc_relation_doi is null OR dc_relation_doi ~* '^10\\\\.[0-9]{4,9}/\\\\S+$'"
    columns:
      - name: record_hk
        description: Clave hash del registro OAI.
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('fct_oai_record_publication')
              field: record_hk
      - name: record_id
        description: Identificador OAI-PMH del record.
        data_tests: [not_null, unique]
      - name: dc_type
        description: Lista raw de valores `dc.type` agregados en OAI y concatenados con `|`.
      - name: dc_type_count
        description: Cantidad de valores distintos de `dc.type` detectados para el record.
        data_tests: [not_null]
      - name: has_multiple_dc_type
        description: Flag que indica multiplicidad de `dc.type` en el record.
        data_tests: [not_null]
      - name: repository_identifier
        description: Identificador del repositorio OAI del que proviene el registro.
      - name: institution_ror
        description: ROR institucional asignado al contexto de extraccion.
      - name: valid_date_issued
        description: >
          Flag heredado de `fct_oai_record_publication` que indica si `date_issued`
          cae dentro del rango válido definido por la estructura OAI.
        data_tests: [not_null]
      - name: dc_identifier_uri
        description: Handle institucional filtrado por prefijo CONICET.
        data_tests:
          - not_null
          - unique
      - name: dc_relation_doi
        description: DOI principal obtenido desde `dc.relation`.
        data_tests:
          - unique:
              config:
                severity: warn
