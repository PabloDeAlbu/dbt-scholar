version: 2

models:
  - name: audit_conicet_oai_record_pid_candidates
    description: >
      Auditoría detallada de valores candidatos a PID presentes en `dc.identifier`
      y `dc.relation` para el subset OAI de CONICET. Señala si el valor entra o
      no en la regla DOI actual y clasifica patrones observables como handle,
      ORCID, arXiv, ISBN, ISSN, DOI o URL genérica.
    config:
      tags: [audit, conicet]
    columns:
      - name: record_hk
        data_tests: [not_null]
      - name: record_id
        data_tests: [not_null]
      - name: source_field
        data_tests: [not_null]
      - name: source_row_hk
        data_tests: [not_null]
      - name: relation_parse_status
        data_tests: [not_null]
      - name: identifier_value
      - name: raw_value
      - name: enters_current_doi_rule
        data_tests: [not_null]
      - name: pid_candidate_type
        data_tests: [not_null]
      - name: current_rule_status
        data_tests: [not_null]

  - name: audit_conicet_oai_record_relation_doi_parse
    description: >
      Auditoría detallada del parseo de `dc.relation` para relaciones `altIdentifier/doi` del
      subset OAI de CONICET. Permite detectar DOI vacíos, truncados o correctamente parseados.
    config:
      tags: [audit, conicet]
    columns:
      - name: record_hk
        data_tests: [not_null]
      - name: record_id
        data_tests: [not_null]
      - name: dc_relation
        data_tests: [not_null]
      - name: doi_parse_pattern
        data_tests: [not_null]

  - name: audit_conicet_oai_record_relation_doi_parse_summary
    description: >
      Summary agregado de patterns del parseo DOI en `dc.relation` para CONICET OAI.
    config:
      tags: [audit, conicet]
    columns:
      - name: doi_parse_pattern
        data_tests: [not_null]
      - name: row_count
        data_tests: [not_null]
      - name: record_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_coverage
    description: >
      Auditoría simple de cobertura DOI para publicaciones CONICET OAI y OpenAIRE. Resume volumen
      de entidades con DOI raw, DOI normalizado y el volumen actual de matches exactos por DOI.
    config:
      tags: [audit, conicet]
    columns:
      - name: source_system
        data_tests: [not_null]
      - name: entity_count
        data_tests: [not_null]
      - name: entity_with_doi_raw_count
        data_tests: [not_null]
      - name: entity_with_doi_normalized_count
        data_tests: [not_null]
      - name: distinct_doi_normalized_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_match_summary
    description: >
      Summary de matches DOI entre OAI y OpenAIRE para CONICET. Distingue matches únicos y
      ambiguos sin tratarlos todavía como errores.
    config:
      tags: [audit, conicet]
    columns:
      - name: match_rule
        data_tests: [not_null]
      - name: match_row_count
        data_tests: [not_null]
      - name: unique_match_row_count
        data_tests: [not_null]
      - name: ambiguous_match_row_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_examples
    description: >
      Tabla de ejemplos de DOI raw y normalizados por fuente para inspección manual. Indica si el
      DOI participó o no en algún match del bridge `brg_conicet_publication_doi`.
    config:
      tags: [audit, conicet]
    columns:
      - name: source_system
        data_tests: [not_null]
      - name: entity_id
        data_tests: [not_null]
      - name: doi_raw
        data_tests: [not_null]
      - name: has_match
        data_tests: [not_null]

  - name: fct_conicet_oai_record_publication_quality
    description: >
      Fact de quality a nivel record para el subset OAI de CONICET. Expone patterns
      y flags de validación sobre identifier URI, DOI y multiplicidad de `dc.type`
      para debugging de normalización y ajuste de tests.
    config:
      tags: [audit, conicet]
    columns:
      - name: record_hk
        description: Clave hash del record auditado.
        data_tests: [not_null, unique]
      - name: record_id
        description: Identificador OAI-PMH del record.
        data_tests: [not_null]
      - name: dc_identifier_uri_pattern
        description: Pattern clasificado para `dc_identifier_uri`.
        data_tests: [not_null]
      - name: dc_identifier_uri_is_valid
        description: Flag de validez del identifier URI según el contrato auditado.
        data_tests: [not_null]
      - name: dc_relation_doi_pattern
        description: Pattern clasificado para `dc_relation_doi`.
        data_tests: [not_null]
      - name: dc_relation_doi_is_valid
        description: Flag de validez del DOI según el contrato auditado.
        data_tests: [not_null]
      - name: dc_type_count
        description: Cantidad de valores distintos de `dc.type` detectados para el record.
        data_tests: [not_null]
      - name: has_multiple_dc_type
        description: Flag de multiplicidad de `dc.type`.
        data_tests: [not_null]

  - name: fct_conicet_oai_record_publication_quality_summary
    description: >
      Summary agregado de quality para el subset OAI de CONICET. Resume volumen
      total, valid e invalid por dimensión de control y pattern detectado.
    config:
      tags: [audit, conicet]
    columns:
      - name: quality_dimension
        description: Dimensión auditada (`dc_identifier_uri` o `dc_relation_doi`).
        data_tests: [not_null]
      - name: quality_pattern
        description: Pattern detectado dentro de la dimensión auditada.
        data_tests: [not_null]
      - name: record_count
        description: Cantidad total de records en el pattern.
        data_tests: [not_null]
      - name: valid_record_count
        description: Cantidad de records válidos en el pattern.
        data_tests: [not_null]
      - name: invalid_record_count
        description: Cantidad de records inválidos en el pattern.
        data_tests: [not_null]
