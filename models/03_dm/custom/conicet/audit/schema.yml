version: 2

models:
  - name: audit_conicet_oai_record_pid_candidates
    description: >
      Auditoría detallada de valores candidatos a PID presentes en `dc.identifier`
      y `dc.relation` para el subset OAI de CONICET. Señala si el valor entra o
      no en la regla DOI actual y clasifica patrones observables como handle,
      ORCID, arXiv, ISBN, ISSN, DOI o URL genérica.
    config:
      tags: [audit, conicet]
    columns:
      - name: record_hk
        data_tests: [not_null]
      - name: record_id
        data_tests: [not_null]
      - name: source_field
        data_tests: [not_null]
      - name: source_row_hk
        data_tests: [not_null]
      - name: relation_parse_status
        data_tests: [not_null]
      - name: identifier_value
      - name: raw_value
      - name: enters_current_doi_rule
        data_tests: [not_null]
      - name: pid_candidate_type
        data_tests: [not_null]
      - name: current_rule_status
        data_tests: [not_null]

  - name: audit_conicet_oai_record_relation_doi_parse
    description: >
      Auditoría detallada del parseo de `dc.relation` para relaciones `altIdentifier/doi` del
      subset OAI de CONICET. Permite detectar DOI vacíos, truncados o correctamente parseados.
    config:
      tags: [audit, conicet]
    columns:
      - name: record_hk
        data_tests: [not_null]
      - name: record_id
        data_tests: [not_null]
      - name: dc_relation
        data_tests: [not_null]
      - name: doi_parse_pattern
        data_tests: [not_null]

  - name: audit_conicet_oai_record_relation_doi_parse_summary
    description: >
      Summary agregado de patterns del parseo DOI en `dc.relation` para CONICET OAI.
    config:
      tags: [audit, conicet]
    columns:
      - name: doi_parse_pattern
        data_tests: [not_null]
      - name: row_count
        data_tests: [not_null]
      - name: record_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_coverage
    description: >
      Auditoría simple de cobertura DOI para publicaciones CONICET OAI y OpenAIRE. Resume volumen
      de entidades con DOI raw, DOI normalizado y el volumen actual de matches exactos por DOI.
    config:
      tags: [audit, conicet]
    columns:
      - name: source_system
        data_tests: [not_null]
      - name: entity_count
        data_tests: [not_null]
      - name: entity_with_doi_raw_count
        data_tests: [not_null]
      - name: entity_with_doi_normalized_count
        data_tests: [not_null]
      - name: distinct_doi_normalized_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_match_summary
    description: >
      Summary de matches DOI entre OAI y OpenAIRE para CONICET. Distingue matches únicos y
      ambiguos sin tratarlos todavía como errores.
    config:
      tags: [audit, conicet]
    columns:
      - name: match_rule
        data_tests: [not_null]
      - name: match_row_count
        data_tests: [not_null]
      - name: unique_match_row_count
        data_tests: [not_null]
      - name: ambiguous_match_row_count
        data_tests: [not_null]

  - name: audit_conicet_publication_doi_examples
    description: >
      Tabla de ejemplos de DOI raw y normalizados por fuente para inspección manual. Indica si el
      DOI participó o no en algún match del bridge `brg_conicet_publication_doi`.
    config:
      tags: [audit, conicet]
    columns:
      - name: source_system
        data_tests: [not_null]
      - name: entity_id
        data_tests: [not_null]
      - name: doi_raw
        data_tests: [not_null]
      - name: has_match
        data_tests: [not_null]
