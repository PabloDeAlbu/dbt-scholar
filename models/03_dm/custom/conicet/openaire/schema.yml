version: 2

models:
  - name: fct_conicet_openaire_researchproduct
    description: >
      Subconjunto institucional CONICET del hecho de publicaciones OpenAIRE, filtrado por organización
      (ROR) aplicada durante la extracción para construir una cohorte reproducible.
    config:
      tags: [conicet, dm]
    data_tests:
      - dbt_utils.expression_is_true:
          name: conicet_openaire_rel_organization_ror_format
          expression: "trim(relOrganizationId) ~ '^https?://ror[.]org/[0-9a-z]{9}/?$'"
          config:
            alias: conicet_openaire_rel_organization_ror_format
    columns:
      - name: researchproduct_hk
        description: Clave hash del research product (PK del hub).
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_openaire_researchproduct')
              field: researchproduct_hk
      - name: researchproduct_id
        description: Identificador canónico de OpenAIRE.
        data_tests:
          - not_null
          - unique
      - name: conicet_last_extract_datetime
        description: Última fecha/hora en la que el research product fue observado en la cohorte CONICET.
        data_tests: [not_null]
      - name: relOrganizationId
        description: Identificador ROR (URL) utilizado para filtrar la cohorte CONICET.
        data_tests: [not_null]
