version: 2

models:
  - name: fct_openaire_researchproduct_extraction
    description: >
      Audit fact for OpenAIRE extraction events. Records each observation of a research
      product in an extraction, including the applied filter, extraction timestamp,
      and warehouse load timestamp. Reuses `extract_cdk` from the extraction satellite
      as the event identifier.
    config:
      tags: [audit, openaire]
    columns:
      - name: extract_cdk
        description: Extraction business key reused from the Data Vault satellite.
        data_tests:
          - not_null
          - unique

      - name: researchproduct_hk
        description: Hash key of the OpenAIRE research product.
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_openaire_researchproduct')
              field: researchproduct_hk

      - name: researchproduct_id
        description: Canonical OpenAIRE identifier for the research product.
        data_tests:
          - not_null

      - name: _filter_param
        description: Name of the filter parameter applied during extraction.
        data_tests:
          - not_null

      - name: _filter_value
        description: Value of the filter parameter applied during extraction.
        data_tests:
          - not_null

      - name: extract_datetime
        description: Timestamp of the extraction event in OpenAIRE.
        data_tests:
          - not_null

      - name: load_datetime
        description: Timestamp when the record was loaded into the warehouse.
        data_tests:
          - not_null

      - name: source
        description: Source label provided by OpenAIRE for the extraction record.

  - name: fct_openaire_researchproduct_extraction_fby_relorgid
    description: >
      Audit view by `relOrganizationId`. It shows which OpenAIRE extraction
      retrieved each research product for the ROR used in the extraction method.
    config:
      tags: [audit, openaire]
    columns:
      - name: extract_cdk
        description: Extraction key from the Data Vault satellite.
        data_tests:
          - not_null
          - unique
      - name: researchproduct_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_openaire_researchproduct')
              field: researchproduct_hk
      - name: researchproduct_id
        data_tests:
          - not_null
      - name: organization_ror
        description: ROR used by the extraction method to retrieve data from OpenAIRE.
        data_tests:
          - not_null
      - name: organization_hk
        description: OpenAIRE organization hash key when a ROR match exists.
      - name: organization_id
        description: Canonical OpenAIRE organization identifier.
      - name: organization_name
        description: Organization name.
      - name: legalname
        description: OpenAIRE legal name.
      - name: acronym
        description: OpenAIRE acronym.
      - name: extract_datetime
        data_tests:
          - not_null
      - name: load_datetime
        data_tests:
          - not_null
