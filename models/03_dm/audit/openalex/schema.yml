version: 2

models:
  - name: fct_openalex_work_extraction_window
    description: >
      Ventana temporal de observación por work y criterio de extracción. Resume
      primera y última observación/carga a partir del hecho base de extracción.
    config:
      tags: [audit, openalex]
    columns:
      - name: work_hk
        data_tests: [not_null]
      - name: _filter_param
        data_tests: [not_null]
      - name: _filter_value
        data_tests: [not_null]

  - name: fct_openalex_work_extraction_fby_instsror
    description: >
      Audit view by `institutions.ror`. It shows which OpenAlex extraction
      retrieved each work for the ROR used in the extraction method.
    config:
      tags: [audit, openalex]
    columns:
      - name: extract_cdk
        description: Extraction key from the Data Vault satellite.
        data_tests:
          - not_null
          - unique
      - name: work_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_openalex_work')
              field: work_hk
      - name: work_id
        data_tests: [not_null]
      - name: institution_ror
        description: ROR used by the extraction method to retrieve data from OpenAlex.
        data_tests: [not_null]
      - name: institution_hk
        description: OpenAlex institution hash key when a ROR match exists.
      - name: institution_id
        description: Canonical OpenAlex institution identifier.
      - name: institution_display_name
        description: Institution display name.
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]
