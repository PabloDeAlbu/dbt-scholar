version: 2

models:
  - name: fct_openalex_work_extraction
    description: >
      Audit fact for OpenAlex extraction events. Records each observation of a work
      in an extraction, including any applied filter plus extraction and warehouse
      load timestamps. Reuses `extract_cdk` from the extraction satellite as the
      event identifier.
    config:
      tags: [audit, openalex]
    columns:
      - name: extract_cdk
        description: Extraction business key reused from the Data Vault satellite.
        data_tests:
          - not_null
          - unique

      - name: work_hk
        description: Hash key of the OpenAlex work.
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_openalex_work')
              field: work_hk

      - name: work_id
        description: Canonical OpenAlex identifier for the work.
        data_tests:
          - not_null

      - name: _filter_param
        description: Name of the filter parameter applied during extraction.

      - name: _filter_value
        description: Value of the filter parameter applied during extraction.

      - name: extract_datetime
        description: Timestamp of the extraction event in OpenAlex.
        data_tests:
          - not_null

      - name: load_datetime
        description: Timestamp when the record was loaded into the warehouse.
        data_tests:
          - not_null

      - name: source
        description: Source label provided by OpenAlex for the extraction record.

  - name: fct_openalex_work_extraction_fby_instsror
    description: >
      Audit view by `institutions.ror`. It shows which OpenAlex extraction
      retrieved each work for the ROR used in the extraction method.
    config:
      tags: [audit, openalex]
    columns:
      - name: extract_cdk
        description: Extraction key from the Data Vault satellite.
        data_tests:
          - not_null
          - unique
      - name: work_hk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_openalex_work')
              field: work_hk
      - name: work_id
        data_tests: [not_null]
      - name: institution_ror
        description: ROR used by the extraction method to retrieve data from OpenAlex.
        data_tests: [not_null]
      - name: institution_hk
        description: OpenAlex institution hash key when a ROR match exists.
      - name: institution_id
        description: Canonical OpenAlex institution identifier.
      - name: institution_display_name
        description: Institution display name.
      - name: extract_datetime
        data_tests: [not_null]
      - name: load_datetime
        data_tests: [not_null]
