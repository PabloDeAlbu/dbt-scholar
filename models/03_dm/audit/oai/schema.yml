version: 2

models:
  - name: fct_oai_record_extraction_window
    description: >
      Ventana temporal de observación por record OAI, repositorio e institución.
      Resume primera y última observación/carga a partir del hecho base de extracción.
    config:
      tags: [audit, oai]
    columns:
      - name: record_hk
        data_tests: [not_null]
      - name: repository_identifier
        data_tests: [not_null]
      - name: institution_ror
        data_tests: [not_null]
