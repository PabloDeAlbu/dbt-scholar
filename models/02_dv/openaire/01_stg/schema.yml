version: 2

models:
  - name: stg_openaire_researchproduct__extract
    description: >
      Staging model for OpenAIRE research product extraction events.
      It standardizes extraction metadata and builds `extract_cdk` to identify
      each extracted record by entity, extraction time, and applied filter.
    columns:
      - name: extract_cdk
        description: >
          Hash key for the extraction event.
          It identifies the extracted record by research product, extraction time,
          and filter values.
