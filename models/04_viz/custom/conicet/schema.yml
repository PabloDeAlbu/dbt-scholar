version: 2

models:
  - name: viz_conicet_publication_openaire_doi
    description: >
      Vista mínima de consumo sobre `fct_conicet_publication` para observar el
      enriquecimiento por match único de DOI con OpenAIRE. Conserva el grano de
      la publicación OAI y expone sólo un subconjunto corto de atributos base y
      de la fuente enriquecedora.
    config:
      tags: [viz]
    columns:
      - name: record_hk
        description: Clave hash de la publicación CONICET basada en OAI.
        data_tests: [not_null, unique]
      - name: record_id
        description: Identificador OAI-PMH del registro.
        data_tests: [not_null]
      - name: title
        description: Título principal de la publicación.
      - name: publication_date
        description: Fecha de publicación proveniente de la base OAI.
      - name: publication_year
        description: Año derivado de la fecha de publicación OAI.
      - name: publication_type
        description: Tipo de publicación canónico resuelto sobre la base OAI.
      - name: access_right
        description: Condición de acceso canónica resuelta sobre la base OAI.
      - name: institutional_uri
        description: URI institucional de la publicación en el repositorio CONICET.
      - name: doi
        description: DOI principal detectado del lado OAI.
      - name: matched_by_unique_doi
        description: >
          Flag que indica si la publicación pudo enriquecerse con OpenAIRE
          mediante un match único 1 a 1 por DOI normalizado.
        data_tests: [not_null]
      - name: has_doi_label
        description: >
          Label de consumo para Superset que resume presencia de DOI en la
          publicación OAI (`Con DOI` / `Sin DOI`).
        data_tests: [not_null]
      - name: matched_by_unique_doi_label
        description: >
          Label de consumo para Superset que resume si hubo match único por DOI
          con OpenAIRE.
        data_tests: [not_null]
      - name: doi_integration_status_label
        description: >
          Estado integrado de cobertura DOI para visualización. Valores esperados:
          `Sin DOI`, `Con DOI y con match`, `Con DOI y sin match`.
        data_tests: [not_null]
      - name: openaire_researchproduct_id
        description: Identificador OpenAIRE de la publicación matcheada por DOI.
      - name: openaire_publication_date
        description: Fecha de publicación informada por OpenAIRE.
      - name: openaire_type
        description: Tipo de publicación informado por OpenAIRE.
      - name: openaire_access_right
        description: Condición de acceso principal informada por OpenAIRE.
      - name: openaire_citation_count
        description: Cantidad de citas informada por OpenAIRE.

  - name: viz_conicet_publication_pid_profile
    description: >
      Vista de consumo para caracterizar la disponibilidad de PIDs en publicaciones
      CONICET con base explícita en la fuente OAI institucional. Mantiene el grano
      de `record_hk` de `fct_conicet_oai_record_publication`, resuelve el tipo de
      publicación a partir de `dc.type` y agrega, cuando existe match único por DOI,
      el enriquecimiento de PIDs proveniente de OpenAIRE.
    config:
      tags: [viz]
    columns:
      - name: record_hk
        description: Clave hash de la publicación CONICET a grano record.
        data_tests: [not_null, unique]
      - name: record_id
        description: Identificador OAI-PMH del registro institucional.
        data_tests: [not_null]
      - name: source_system
        description: Fuente base del perfilado; en esta vista corresponde al registro OAI institucional.
        data_tests: [not_null]
      - name: title
        description: Título principal de la publicación.
      - name: publication_year
        description: Año de publicación derivado de `date_issued` cuando la fecha OAI es válida.
      - name: publication_type
        description: Tipo de publicación resuelto desde `dc.type` vía mapeo a COAR.
      - name: subject_area
        description: Área temática principal proveniente del perfilado FOS del registro OAI.
      - name: institutional_uri
        description: URI institucional de la publicación en el repositorio CONICET.
      - name: doi
        description: DOI principal detectado del lado OAI.
      - name: has_doi
        description: Flag base que indica presencia de DOI en la fuente OAI.
        data_tests: [not_null]
      - name: matched_by_unique_doi
        description: Flag que indica si la publicación OAI pudo vincularse 1 a 1 con OpenAIRE por DOI.
        data_tests: [not_null]
      - name: has_repo_handle
        description: Flag que indica presencia de identificador institucional tipo handle/URI en OAI.
        data_tests: [not_null]
      - name: has_openaire_doi
        description: Flag que indica presencia de DOI del lado OpenAIRE para la publicación matcheada.
        data_tests: [not_null]
      - name: openaire_doi_count
        description: Cantidad de DOIs asociados en OpenAIRE a la publicación matcheada.
        data_tests: [not_null]
      - name: has_openaire_handle
        description: Flag que indica presencia de handle del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_handle_count
        description: Cantidad de handles asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_openaire_arxiv
        description: Flag que indica presencia de identificador arXiv del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_arxiv_count
        description: Cantidad de identificadores arXiv asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_openaire_pmid
        description: Flag que indica presencia de PMID del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_pmid_count
        description: Cantidad de PMIDs asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_openaire_pmc
        description: Flag que indica presencia de PMC del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_pmc_count
        description: Cantidad de PMCs asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_openaire_pmb
        description: Flag que indica presencia de PMB del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_pmb_count
        description: Cantidad de PMBs asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_openaire_mag
        description: Flag que indica presencia de MAG ID del lado OpenAIRE.
        data_tests: [not_null]
      - name: openaire_mag_count
        description: Cantidad de MAG IDs asociados en OpenAIRE.
        data_tests: [not_null]
      - name: has_doi_label
        description: Label binario de disponibilidad de DOI para visualización.
        data_tests: [not_null]

  - name: viz_conicet_publication_pid_coverage
    description: >
      Vista agregada de cobertura DOI para análisis descriptivo en Superset.
      Expone conteos y proporciones de publicaciones con DOI según dimensión
      analítica (`publication_type`, `publication_year`, `subject_area`) en una
      interfaz única de consumo.
    config:
      tags: [viz]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [analysis_dimension, analysis_value]
    columns:
      - name: analysis_dimension
        description: Dimensión analítica usada para la agregación.
        data_tests: [not_null]
      - name: analysis_value
        description: Valor de la dimensión analítica agregada.
        data_tests: [not_null]
      - name: publication_count
        description: Cantidad total de publicaciones para la dimensión/valor.
        data_tests: [not_null]
      - name: publication_with_doi_count
        description: Cantidad de publicaciones con DOI para la dimensión/valor.
        data_tests: [not_null]
      - name: publication_without_doi_count
        description: Cantidad de publicaciones sin DOI para la dimensión/valor.
        data_tests: [not_null]
      - name: publication_with_doi_ratio
        description: Proporción de publicaciones con DOI para la dimensión/valor.
        data_tests: [not_null]
      - name: publication_without_doi_ratio
        description: Proporción de publicaciones sin DOI para la dimensión/valor.


  - name: viz_conicet_oai_pid_candidate_summary
    description: >
      Vista agregada para explorar candidatos a PID presentes en `dc.identifier`
      y `dc.relation` del subset OAI de CONICET. Resume volumen por patrón
      detectado y por estado respecto de las reglas actuales de identificación.
    config:
      tags: [viz]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            [source_field, relation_parse_status, relation_type, identifier_type, pid_candidate_type, current_rule_status, enters_current_doi_rule]
    columns:
      - name: source_field
        description: Campo OAI de origen (`dc_identifier` o `dc_relation`).
        data_tests: [not_null]
      - name: relation_parse_status
        description: Tipo de parseo aplicado a `dc.relation` (`eu_repo_semantic`, `raw_url`, `slash_text`, `free_text`) o fallback textual si no aplica.
        data_tests: [not_null]
      - name: relation_type
        description: Tipo de relación parseado desde `dc.relation` o fallback textual si no aplica.
        data_tests: [not_null]
      - name: identifier_type
        description: Tipo de identificador parseado desde `dc.relation` o fallback textual si no aplica.
        data_tests: [not_null]
      - name: pid_candidate_type
        description: Clasificación heurística del valor observado.
        data_tests: [not_null]
      - name: current_rule_status
        description: Estado del valor respecto de las reglas actuales del modelo CONICET.
        data_tests: [not_null]
      - name: enters_current_doi_rule
        description: Flag que indica si el valor entra en la regla DOI actual.
        data_tests: [not_null]
      - name: row_count
        description: Cantidad de filas raw observadas para la combinación.
        data_tests: [not_null]
      - name: record_count
        description: Cantidad de records distintos afectados por la combinación.
        data_tests: [not_null]

  - name: viz_conicet_oai_pid_record_distribution
    description: >
      Vista agregada de distribución de records OAI de CONICET por tipo de
      identificador observado. Trabaja a nivel `record_hk` y excluye los valores
      clasificados como `other` y `empty` para facilitar la lectura de cobertura
      por identificador.
    config:
      tags: [viz]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            [source_field, relation_parse_status, relation_type, identifier_type, pid_candidate_type, current_rule_status, enters_current_doi_rule]
    columns:
      - name: source_field
        description: Campo OAI de origen (`dc_identifier` o `dc_relation`).
        data_tests: [not_null]
      - name: relation_parse_status
        description: Tipo de parseo aplicado a `dc.relation` o `not_applicable` para `dc_identifier`.
        data_tests: [not_null]
      - name: relation_type
        description: Tipo de relación parseado desde `dc.relation` o fallback textual si no aplica.
        data_tests: [not_null]
      - name: identifier_type
        description: Tipo de identificador parseado desde `dc.relation` o fallback textual si no aplica.
        data_tests: [not_null]
      - name: pid_candidate_type
        description: Tipo de identificador considerado en la distribución.
        data_tests: [not_null]
      - name: current_rule_status
        description: Estado del valor respecto de las reglas actuales del modelo CONICET.
        data_tests: [not_null]
      - name: enters_current_doi_rule
        description: Flag que indica si el valor entra en la regla DOI actual.
        data_tests: [not_null]
      - name: record_count
        description: Cantidad de records distintos con el identificador observado.
        data_tests: [not_null]
      - name: total_record_count
        description: Cantidad total de records en el universo OAI de CONICET.
        data_tests: [not_null]
      - name: record_ratio
        description: Proporción de records con el identificador observado sobre el universo total.
