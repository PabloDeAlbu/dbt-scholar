version: 2

models:
  - name: fct_unlp_dspace5db_item_available_monthly_agg
    description: >
      Serie mensual del repositorio UNLP basada en `dc.date.available`, con altas del mes
      y acumulado total al cierre de cada mes.
    config:
      tags: [viz, unlp]
    columns:
      - name: available_month
        description: Primer día del mes usado como eje temporal.
        data_tests: [not_null, unique]
      - name: items_available_monthly
        description: Cantidad de ítems cuya fecha `dc.date.available` cae en ese mes.
        data_tests: [not_null]
      - name: items_available_cumulative
        description: Acumulado total de ítems disponibles hasta el cierre de ese mes.
        data_tests: [not_null]
