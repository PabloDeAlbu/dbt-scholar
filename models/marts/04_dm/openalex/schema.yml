version: 2

models:
  - name: dim_openalex_author
    columns:
      - name: author_id
        tests:
          - not_null
          - unique
      - name: author_hk
        tests:
          - not_null
          - unique
      - name: display_name
      - name: works_count
      - name: cited_by_count
      - name: orcid
      - name: has_orcid

  - name: fct_openalex_work_publication
    description: >
      Hecho de obras de OpenAlex con metadatos principales, métricas y
      PIDs (doi/mag/pmcid/pmid). Incluye flags booleanos has_* para
      facilitar filtrado en dashboards.
    columns:
      - name: work_id
        description: ID de OpenAlex
        tests:
          - not_null
          - unique

      - name: work_hk
        description: Clave hash/primaria del hub de work.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('hub_openalex_work')
              field: work_hk

      - name: title
        description: Título de la obra.

      - name: type
        description: Tipo de obra según OpenAlex (journal-article, book, etc).

      - name: publication_year
        description: Año de publicación (numérico).

      - name: publication_date
        description: Fecha de publicación (si está disponible).

      - name: countries_distinct_count
        description: Cantidad de países distintos en afiliaciones.

      - name: institutions_distinct_count
        description: Cantidad de instituciones distintas en afiliaciones.

      - name: fwci
        description: Field-Weighted Citation Impact (si disponible).

      - name: has_fulltext
        description: Indica si se detectó fulltext en OpenAlex.

      - name: fulltext_origin
        description: Origen del fulltext (repo, publisher, etc).

      - name: cited_by_count
        description: Conteo de citas.

      - name: is_retracted
        description: Flag de retracción.

      - name: is_paratext
        description: Flag de paratexto.

      - name: locations_count
        description: Cantidad de ubicaciones (publisher/repo).

      - name: referenced_works_count
        description: Cantidad de obras referenciadas.

      - name: any_repository_has_fulltext
        description: Algún repositorio tiene fulltext.

      - name: is_oa
        description: Flag de acceso abierto.

      - name: oa_status
        description: Estado OA (gold, green, hybrid, bronze, closed).

      - name: oa_url
        description: URL OA principal (si existe).

      - name: cited_by_percentile_year_max
        description: Máximo percentil anual de citas normalizado.

      - name: cited_by_percentile_year_min
        description: Mínimo percentil anual de citas normalizado.

      - name: citation_normalized_percentile_is_in_top_10_percent
        description: Flag si entra en top 10% normalizado.

      - name: citation_normalized_percentile_is_in_top_1_percent
        description: Flag si entra en top 1% normalizado.

      - name: citation_normalized_percentile_value
        description: Valor de percentil de citas normalizado.

      - name: apc_list_currency
        description: Moneda de APC listada.

      - name: apc_list_value
        description: Valor de APC listada.

      - name: apc_list_value_usd
        description: Valor de APC listada en USD.

      - name: apc_paid_currency
        description: Moneda de APC pagada.

      - name: apc_paid_value
        description: Valor de APC pagada.

      - name: apc_paid_value_usd
        description: Valor de APC pagada en USD.

      # --- PIDs y flags ---
      - name: doi
        description: DOI sin prefijo https://doi.org/ o '-' si no hay.
      - name: mag
        description: Identificador Microsoft Academic Graph o '-' si no hay.
      - name: pmcid
        description: Identificador PMC o '-' si no hay.
      - name: pmid
        description: Identificador PubMed o '-' si no hay.

